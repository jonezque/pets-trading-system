name: Deploy

# Builds the image, pushes to Artifact Registry, and applies Terraform to
# deploy a new Cloud Run revision. Auth via Workload Identity Federation
# (no long-lived service-account keys).

# Manual trigger only: enable the push trigger once the GCP secrets
# (GCP_WIF_PROVIDER, GCP_DEPLOY_SA, GCP_PROJECT_ID) are configured.
on:
  workflow_dispatch:

env:
  REGION: europe-west1
  REPO: pets
  SERVICE: pets-trading

permissions:
  contents: read
  id-token: write # required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build & push image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${REPO}/app:${GITHUB_SHA::12}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        working-directory: infra
        run: |
          terraform init
          terraform apply -auto-approve \
            -var "project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var "region=${REGION}" \
            -var "image=${IMAGE}"

      - name: Output service URL
        working-directory: infra
        run: terraform output -raw service_url
